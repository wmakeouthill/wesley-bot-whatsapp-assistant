services:
  api:
    # Imagem pré-buildada no GitHub Actions (GHCR)
    # Local dev: docker compose up --build  (usa o Dockerfile)
    # VPS prod:  docker compose pull api && docker compose up -d --no-build
    image: ghcr.io/wmakeouthill/wesley-bot-whatsapp-assistant:latest
    build: .
    container_name: bot_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Credenciais secretas puxadas de variáveis de ambiente reais da Oracle
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_API_URL=http://bot_evolution_api:8080
      # URL pública para o Evolution API chamar o bot (via IP do VPS)
      - WEBHOOK_URL=http://${VPS_IP:-163.176.194.195}:8000/webhooks/evolution
      # Acesso direto ao banco da Evolution para resolver LID → telefone
      - EVOLUTION_DB_URL=postgresql://bot_user:${POSTGRES_PASSWORD}@bot_postgres:5432/evolution_db
    depends_on:
      bot_postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'', timeout=5)" 2>/dev/null || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bot_network

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: bot_evolution_api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      bot_postgres:
        condition: service_healthy
      bot_redis:
        condition: service_started
    environment:
      # Configurações do servidor
      - SERVER_URL=http://${VPS_IP:-163.176.194.195}:8080
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR,WARN

      # Banco de dados - persiste tudo para resolver LID → telefone
      # connection_limit=5: limita conexões no pool Prisma (evita esgotamento)
      # pool_timeout=30: aguarda até 30s por conexão livre antes de falhar
      # connect_timeout=10: timeout ao estabelecer nova conexão (evita hang indefinido)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://bot_user:${POSTGRES_PASSWORD}@bot_postgres:5432/evolution_db?schema=public&connection_limit=5&pool_timeout=30&connect_timeout=10
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_MESSAGE_STAGE=false

      # Redis - necessário para QR code buffering (~15MB)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://bot_redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false

      # Segurança da API
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_ENV=true

      # Configurações do WhatsApp
      - WA_SESSION_ID=wesley_bot_session
      - DEL_INSTANCE=false
      - ALWAYS_ONLINE=true
      - QRCODE_LIMIT=50
      - QRCODE_EXPIRATION_IN_SECONDS=60
      # Versão do WhatsApp Web para Baileys.
      # Deixar vazio = busca do GitHub a cada startup (pode falhar se GitHub indisponível).
      # Fixar versão garante reconexões confiáveis mesmo sem internet no momento.
      # Para atualizar: verificar https://web.whatsapp.com/check-update?version=1&platform=web
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1023179
    volumes:
      - evolution_db:/bot/evolution_db
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    healthcheck:
      # Verifica se a Evolution API está aceitando conexões HTTP
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:8080/'',function(r){process.exit(r.statusCode<500?0:1)}).on(''error'',function(){process.exit(1)})"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bot_network

  bot_redis:
    image: redis:7-alpine
    container_name: bot_redis
    restart: always
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru --save ""
    networks:
      - bot_network

  bot_postgres:
    image: postgres:14-alpine
    container_name: bot_postgres
    restart: always
    environment:
      - POSTGRES_USER=bot_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=evolution_db
    networks:
      - bot_network
    volumes:
      - bot_postgres_data:/var/lib/postgresql/data
    # Healthcheck: garante que o postgres está aceitando conexões antes
    # de permitir que Evolution API e bot_api iniciem.
    # Se o postgres reiniciar, os dependentes (restart: always) reiniciam
    # e aguardam o postgres ficar saudável novamente antes de conectar.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user -d evolution_db"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  bot_network:
    driver: bridge

volumes:
  bot_postgres_data:
  evolution_db:
  evolution_instances:
  evolution_store:
